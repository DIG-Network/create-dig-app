name: publish-npm

# Publish create-dig-app to npmjs. Auth uses npm Trusted Publishing (OIDC) — the workflow requests
# a short-lived OIDC token from GitHub Actions and npm exchanges it for a publish credential; no
# NPM_TOKEN secret is used or needed. Runs when a GitHub Release is published (tag-driven), or on
# manual dispatch.
# The package version published is whatever is in package.json on the released commit — bump it
# before tagging.
#
# create-dig-app is a plain-JS scaffolder CLI (no bundling/build step, no root-level TypeScript —
# `type: "module"`, no tsconfig.json at repo root): it ships bin/lib/templates/templates-ts as-is
# (see package.json `files`). This workflow does NOT re-run the test/coverage suite: ci.yml already
# gates every PR (coverage-gated tests + the TS-scaffold smoke matrix) against the exact tree that
# gets tagged/released, so a release run is build+package+publish only (no flaky-test surface here
# to re-trip a release — see CLAUDE.md flaky-test-management, #489/#488).
on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: build + package + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Trusted publishing requires npm CLI >= 11.5.1; Node 22 bundles npm 10.
      - name: upgrade npm for trusted publishing
        run: |
          npm install -g npm@latest
          npm --version
      - name: publish to npmjs
        run: npm publish --access public
