name: publish-npm

# Publish create-dig-app to npmjs. Auth uses the org-level NPM_TOKEN secret (must be granted to
# this repo in the org secret's repository-access list) — the SAME pattern as chip35_dl_coin's
# publish-npm.yml. Runs when a GitHub Release is published (tag-driven), or on manual dispatch.
# The package version published is whatever is in package.json on the released commit — bump it
# before tagging.
#
# create-dig-app is a plain-JS scaffolder CLI (no bundling/build step, no root-level TypeScript —
# `type: "module"`, no tsconfig.json at repo root): it ships bin/lib/templates/templates-ts as-is
# (see package.json `files`). Its own package.json only defines `test`/`coverage`/`start` scripts,
# so the publish gate here re-runs the SAME coverage-gated suite ci.yml enforces at >=80%
# (.c8rc.json), not a build/typecheck/test:examples pipeline that repo does not have. (The
# generated TypeScript TEMPLATES do have their own `typecheck` script, but that is scaffolded
# output validated by ci.yml's "scaffold + typecheck + build (TS)" job against a sample app in its
# own directory — not something this package builds or typechecks at its own root.)
on:
  push:
    tags: ['v*']
  release:
    types: [published]
  workflow_dispatch: {}

# Serialize publishes; never cancel an in-flight one.
concurrency:
  group: npm-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: coverage-gated tests + npm publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      # Gate the publish on the same coverage-gated test suite ci.yml runs (>=80% per .c8rc.json).
      - run: npm run coverage
      - name: publish to npmjs
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
