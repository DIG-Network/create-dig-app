name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test + coverage gate (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 22 is included because publish-npm.yml's trusted-publishing job runs the same coverage
        # suite on Node 22 (OIDC trusted publishing requires Node >= 22.14.0) — keep the whole
        # supported range covered so a Node-version-specific regression (e.g. the `node --test`
        # CLI's handling of a bare path argument) is caught here, not on a release run.
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # create-dig-app ships with ZERO runtime dependencies; the only dev dependency is the coverage
      # runner (c8), pinned to a version that supports the whole node 18/20/22 matrix. Install it so
      # the suite runs under measured coverage with a CI-enforced ≥80% floor.
      - name: Install dev dependencies (c8, prettier)
        run: npm ci
      - name: Format check (prettier)
        run: npm run format:check
      # `npm run coverage` runs the same `node --test` suite (auto-discovering test/) under c8 with
      # the thresholds in .c8rc.json (lines/branches/functions/statements ≥ 80, scoped to lib/ +
      # bin/). c8 sets NODE_V8_COVERAGE so the spawned bin subprocess (test/bin.test.js) is measured
      # too. The job FAILS if coverage drops below the floor.
      - name: Run tests with the coverage gate (≥80%)
        run: npm run coverage

  # Smoke-test that a scaffolded TypeScript project actually installs, type-checks, and builds.
  # The unit tests assert the file tree / metadata; this job proves the emitted project is real.
  typescript-scaffold:
    name: scaffold + typecheck + build (TS)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # One non-wallet (vite-react) and BOTH wallet templates (dapp-window-chia + nft-drop), which
        # pull in the SDK's shipped types AND the WalletConnect→Sage wiring (@walletconnect/sign-client
        # + the typed WalletConnectOptions, the VITE_WALLETCONNECT_PROJECT_ID env). Enough to catch a
        # broken tsconfig / typed SDK+WC usage / build wiring (nft-drop also exercises the wasm spend
        # builder via vite-plugin-wasm).
        template: [vite-react, dapp-window-chia, nft-drop]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Scaffold the TypeScript variant
        run: node bin/create-dig-app.js sample-ts-app --template ${{ matrix.template }} --typescript
      - name: Assert it emitted TypeScript (tsconfig + a .ts/.tsx source)
        working-directory: sample-ts-app
        run: |
          test -f tsconfig.json
          ls src/*.tsx
      # Wallet templates must scaffold the WalletConnect→Sage path so the dapp connects to Sage in a
      # normal browser: the SDK's optional WC peer dep + the projectId env placeholder must be present.
      - name: Assert WalletConnect→Sage wiring on wallet templates
        if: matrix.template == 'dapp-window-chia' || matrix.template == 'nft-drop'
        working-directory: sample-ts-app
        run: |
          test -f .env.example
          grep -q '^VITE_WALLETCONNECT_PROJECT_ID=' .env.example
          node -e "process.exit((require('./package.json').dependencies||{})['@walletconnect/sign-client']?0:1)"
      - name: Install
        working-directory: sample-ts-app
        run: npm install --no-audit --no-fund
      - name: Type-check
        working-directory: sample-ts-app
        run: npm run typecheck
      - name: Build
        working-directory: sample-ts-app
        run: npm run build
